    owner: maat
    checks:
      - id: AC1
        judge: maat
        evidence: deterministic_allowed_path_scan
        pass_if: Only the approved paths are touched.
      - id: AC2
        judge: maat
        evidence: deterministic_packet_shape_scan
        pass_if: C, P, S, AC, and Goal stay compact.
      - id: AC3
        judge: maat
        evidence: deterministic_forbidden_text_scan
        pass_if: No prompt bundle or placeholder S fields remain.
      - id: AC4
        judge: maat
        evidence: cps_semantic_trace
        pass_if: Live Maat -> Thoth -> Maat trace proves C-boundary, ordered P->S edges, AC judgment, and Goal closure.
