owner_approval_boundary:
  implementation_scope: owner-approved packet and planning-doc edits only
  commit: explicit owner approval required
  push: explicit owner approval required
prohibited_actions:
  - full prompt bundling
  - prompt-bundle inclusion
  - git add
  - git commit
  - git push
evidence_acquisition:
  mode: digest-first maat-evidence
  evidence_generator: deterministic_validator
  authority: evidence only; Maat owns PASS/WARN/FAIL judgment
  C:
    - validate single compact context line under CPS.C
  P:
    - validate P1/P2 are short received inputs, not prompt bundles
  S:
    - validate S1/S2 are concrete operators, not placeholders
  AC:
    - validate every S# result is judged by Maat-owned AC
  Goal:
    - validate explicit Goal closure, not just route JSON/probe counts
  CPS_trace:
    - validate ordered P# receipt, mapped S# operator, P# -> S# edge, AC verdict, and Goal closure
  preflight_probe:
    - validate Maat candidate_agents receive role-local draft_CPS probes, not identical full prompts
    - validate probe responses are gathered as-arrives and summarized for Maat reducer
  failure_codes:
    - FAIL_CPS_SEMANTIC_ABSENCE
    - FAIL_MISSING_LIVE_MAAT_C_BOUNDARY
    - FAIL_MISSING_THOTH_COMPILE
    - FAIL_MISSING_MAAT_FINAL_AC_JUDGMENT
  allowed_paths:
    - /Users/kann/projects/harness-starter/.harness/project/runs/_template/cps_packet.yaml
    - /Users/kann/projects/harness-starter/.harness/project/docs/harness/hn_cps_delegation_packet_plan.md
