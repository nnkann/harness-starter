CPS:
  Goal: Fix the compact CPS packet and plan created by Seshat.
  C: Keep the delegation packet compact and operator-routable without prompt bundles.
  SSOT:
    operational: Project repo is the operational/executable SSOT for CPS templates, active plans, and code-adjacent system definitions.
    decision_memory: harness-brain/GBrain is the decision-memory/history/learning/index SSOT; it may hold backup/reference copies, but it is not the executable template source.
  P1: 'Fix /Users/kann/projects/harness-starter/.harness/project/runs/_template/cps_packet.yaml: keep P1/P2 as short received inputs and replace placeholder S fields with concrete operators.'
  P2: 'Fix /Users/kann/projects/harness-starter/.harness/project/docs/harness/hn_cps_delegation_packet_plan.md: avoid execution-dump references and keep under 120 lines.'
  S1: seshat_doc_ops_fix
  S2: seshat_doc_ops_fix
