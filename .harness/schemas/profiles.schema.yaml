version: 1
schema: harness-hermes-profiles-schema
required_files:
  - .harness/hermes/profiles.yaml
  - .harness/hermes/board-assignees.yaml
  - .harness/hermes/profile-docs/SOUL.md
  - .harness/hermes/profile-docs/AGENTS.md
  - .harness/hermes/profile-docs/USER.md
  - .harness/hermes/profile-skills.yaml
  - .harness/hermes/coordination.yaml
  - .harness/hermes/cps-profile-routing.yaml
  - .harness/hermes/doc-generation.yaml
  - .harness/hermes/gateway.yaml
  - .harness/hermes/sandbox.yaml
required_profile_sets:
  - project_required
  - shared_required
  - skill_first
  - optional
required_profiles:
  - moderator
  - orchestrator
  - coder
  - reviewer
  - threat-guard
  - researcher
  - advisor
  - designer
  - marketer
required_profile_fields:
  - name
  - source_affinity
  - personality
  - primary_axis
  - secondary_axis
  - owns_gateway
  - writes
  - use_when
required_skill_fields:
  - name
  - owner_profiles
  - purpose
  - writes
required_coordination_fields:
  - max_coordination_rounds
  - cps_routing_contract
  - trigger_coordination_when
  - final_moderator_gate
  - doc_generation_contract
required_persona_axes:
  - external-truth
  - internal-truth
  - adversarial
  - execution
  - standard-gate
required_cps_routing_policies:
  - profile_call_requires_cps_reason
  - no_profile_mixing_without_cps_reason
  - gateway_context_is_evidence_not_permission
  - sandbox_scope_comes_from_task_packet
required_profile_doc_terms:
  SOUL.md:
    - HERMES_KANBAN_WORKSPACE is the filesystem anchor
    - Profile output is evidence
  AGENTS.md:
    - task.assignee
    - threat-guard
    - no fallback profile
  USER.md:
    - User preferences belong in USER.md
    - Forbidden Memory
boundary_rules:
  - no project-specific default profiles
  - no imported harness agents or skills
  - gateway permission stays with Hermes gateway config
  - moderator checks AC but does not replace reviewer evidence
  - every mixed profile call cites a CPS dimension or conflict
  - profile output is evidence, not permission
  - document generation follows CPS to doc-ops to moderator gate
